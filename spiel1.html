<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wortstamm-Baum</title>
    <style>
        :root {
            --primary-green: #4caf50;
            --dark-green: #2e7d32;
            --light-green: #e8f5e9;
            --trunk-brown: #5d4037;
            --accent-gold: #ffc107;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f1f8e9 0%, #dcedc8 100%);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh; /* Fest auf Viewport-Höhe */
            color: #333;
            touch-action: none;
            overflow: hidden;
        }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            z-index: 2000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        #home-btn {
            position: absolute; top: 15px; left: 15px;
            background: white; border: 2px solid var(--primary-green);
            padding: 10px 15px; border-radius: 12px; font-size: 1.2rem;
            cursor: pointer; z-index: 1500; box-shadow: var(--shadow);
            -webkit-tap-highlight-color: transparent;
        }

        .mode-btn {
            background: white; border: 2px solid var(--primary-green); padding: 16px 24px; 
            margin: 10px; width: 85%; max-width: 350px;
            border-radius: 16px; font-size: 1.1rem; font-weight: 800; color: var(--dark-green);
            cursor: pointer; box-shadow: 0 4px 0 var(--primary-green); transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .mode-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--primary-green); }
        .mode-btn span { display: block; font-size: 0.8rem; font-weight: normal; opacity: 0.8; }

        header { padding: 5px; text-align: center; flex-shrink: 0; }
        h1 { color: var(--dark-green); margin: 5px 0; font-size: clamp(1.2rem, 4vw, 1.8rem); }

        .leaf-pool-container {
            background: rgba(255, 255, 255, 0.5);
            border-bottom: 2px solid var(--primary-green);
            padding: 10px;
            max-height: 30%; /* Begrenzt die Höhe des Pools */
            overflow-y: auto; /* Scrollbar falls zu viele Blätter */
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
            flex-shrink: 0;
        }

        .leaf-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            width: 100%;
        }

        .leaf {
            background: linear-gradient(135deg, #a5d6a7, #66bb6a);
            color: #1b5e20;
            padding: 8px 16px;
            border-radius: 20px 4px 20px 4px;
            font-weight: 800;
            font-size: 0.85rem;
            cursor: grab;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            user-select: none;
            touch-action: none;
            white-space: nowrap;
        }

        .leaf.stem-leaf { background: linear-gradient(135deg, #8d6e63, #5d4037); color: white; border: 2px solid var(--accent-gold); }
        .leaf.dragging { position: fixed !important; z-index: 3000; opacity: 0.9; transform: scale(1.1); pointer-events: none; }
        .leaf.correct { background: #2e7d32 !important; color: white; cursor: default; }
        .leaf.wrong { background: #8d6e63 !important; color: #ffeb3b !important; animation: shake 0.4s; }

        #check-btn {
            background: var(--accent-gold); color: #5d4037; border: none;
            padding: 10px 25px; font-size: 1rem; font-weight: 900;
            border-radius: 30px; margin-bottom: 8px; cursor: pointer; display: none;
            box-shadow: 0 4px 0 #d4a017;
        }

        .game-area {
            flex: 1;
            display: flex;
            justify-content: space-around;
            align-items: flex-end; /* Bäume stehen am "Boden" des flex-containers */
            padding: 0 10px 100px 10px; /* 100px Abstand zum iPad-Rand */
            gap: 10px;
            width: 100%;
            box-sizing: border-box;
            overflow: hidden;
        }

        .tree {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 300px;
            height: 100%;
            justify-content: flex-end;
            position: relative;
        }

        .tree-crown {
            width: 100%;
            aspect-ratio: 1/1;
            background: #4caf50; 
            border-radius: 50%;
            box-shadow: inset 0 -8px 0 rgba(0,0,0,0.1), var(--shadow);
            display: flex;
            flex-wrap: wrap;
            align-content: center;
            justify-content: center;
            padding: 10%;
            gap: 4px;
            position: relative;
            z-index: 1;
            max-height: 45vh; /* Verhindert dass die Krone zu riesig wird */
        }

        .tree-trunk {
            width: clamp(50px, 15vw, 80px); /* Skaliert mit Bildschirmbreite */
            height: clamp(120px, 25vh, 240px); /* 100% länger */
            background: #5d4037;
            border-radius: 12px 12px 0 0; 
            position: relative;
            margin-top: -15%; /* Überlappt Krone */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            box-shadow: 2px 0 5px rgba(0,0,0,0.2);
        }

        .trunk-label {
            color: white; font-weight: 900;
            font-size: clamp(0.7rem, 2.5vw, 1.2rem);
            text-transform: uppercase;
            pointer-events: none;
            text-align: center;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #win-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 4000;
            text-align: center;
        }
    </style>
</head>
<body>

    <button id="home-btn" onclick="goHome()">🏠</button>

    <div id="start-screen">
        <h1>Wortstamm-Baum 🌳</h1>
        <button class="mode-btn" onclick="startGame('easy')">LEICHT<span>Stämme sind schon da ⭐</span></button>
        <button class="mode-btn" onclick="startGame('medium')">MITTEL<span>Setze zuerst die braunen Stämme ⭐⭐</span></button>
        <button class="mode-btn" onclick="startGame('hard')">SCHWER<span>Sortiere alles selbst ⭐⭐⭐</span></button>
    </div>

    <header>
        <h1 id="main-title">Wortstamm-Baum</h1>
    </header>

    <div class="leaf-pool-container">
        <button id="check-btn" onclick="checkAllTrees()">Bäume prüfen! 🔍</button>
        <div class="leaf-pool" id="pool"></div>
    </div>

    <div class="game-area" id="forest"></div>
    
    <div id="win-screen">
        <h1 style="font-size: 3rem;">🌳</h1>
        <h2 style="color: var(--dark-green);">Baum-Profi!</h2>
        <div id="stars-result" style="font-size: 2.5rem; color: #fbc02d; margin: 20px 0;"></div>
        <button class="mode-btn" style="background: var(--primary-green); color: white;" onclick="location.reload()">Nochmal spielen</button>
    </div>

    <script>
        const families = [
            { stem: "fahr", members: ["Fahrrad", "Abfahrt", "Gefährt", "mitfahren", "umfahren"] },
{ stem: "spiel", members: ["Spielfeld", "Beispiel", "Vorspiel", "mitspielen", "Spielzeug"] },
{ stem: "sprech", members: ["Gespräch", "mitsprechen", "Versprechen", "ansprechen", "Sprachrohr"] },
{ stem: "stell", members: ["Vorstellung", "Bestellung", "feststellen", "Stellplatz", "ausstellen"] },
{ stem: "trag", members: ["Beitrag", "Tragetasche", "vertragen", "Nachtrag", "übertragbar"] },
{ stem: "seh", members: ["Fernsehen", "Aussicht", "hellseherisch", "ansehen", "Versehen"] },
{ stem: "geh", members: ["Gehweg", "Ausgang", "vorgehen", "vergangen", "umgehen"] },
{ stem: "komm", members: ["Ankunft", "Willkommen", "einkommen", "vorkommen", "Abkommen"] },
{ stem: "schlag", members: ["Ratschlag", "Vorschlag", "einschlägig", "Anschlag", "nachschlagen"] },
{ stem: "schreib", members: ["Schreibheft", "Unterschrift", "beschreiben", "Abschrift", "mitschreiben"] },
{ stem: "sitz", members: ["Sitzplatz", "Besitzer", "beiseitesitzen", "Vorsitz", "absitzen"] },
{ stem: "nehm", members: ["Teilnahme", "Unternehmen", "benehmen", "Ausnahme", "abnehmen"] },
{ stem: "brech", members: ["Einbruch", "zerbrechlich", "Ausbruch", "Unterbrechung", "verbrechen"] },
{ stem: "bind", members: ["Verbindung", "Armbinde", "anbinden", "Einband", "entbinden"] },
{ stem: "deck", members: ["Bettdecke", "entdecken", "abdecken", "Versteck", "Dachdecker"] },
{ stem: "denk", members: ["Nachdenken", "Gedanke", "andenken", "Denkmal", "bedenklich"] },
{ stem: "drück", members: ["Ausdruck", "Handdruck", "bedrücken", "unterdrücken", "Drucker"] },
{ stem: "fall", members: ["Zufall", "beifällig", "Unfall", "ausfallen", "Gefallen"] },
{ stem: "fang", members: ["Anfang", "Empfänger", "einfangen", "Gefängnis", "umfangreich"] },
{ stem: "führ", members: ["Führung", "Ausführung", "einführen", "Anführer", "verführerisch"] },
{ stem: "geb", members: ["Aufgabe", "Ergebnis", "angeblich", "Ausgabe", "vergeben"] },
{ stem: "greif", members: ["Begriff", "angreifen", "Eingriff", "handgreiflich", "begreifen"] },
{ stem: "halt", members: ["Inhalt", "anhalten", "Haltbarkeit", "Verhalten", "Unterhalt"] },
{ stem: "hör", members: ["Zuhörer", "aufhören", "gehörig", "Verhör", "hörbar"] },
{ stem: "kleb", members: ["Aufkleber", "festkleben", "Klebstoff", "verklebt", "einkleben"] },
{ stem: "lad", members: ["Einladung", "beladen", "Ladestation", "ausladen", "Überladung"] },
{ stem: "leg", members: ["Anlage", "verlegen", "beilegen", "Überlegung", "gelegen"] },
{ stem: "les", members: ["Lesebuch", "vorlesen", "auslesen", "Leseratte", "erlesen"] },
{ stem: "ruf", members: ["Anruf", "Ausruf", "ausrufen", "Widerruf", "Zuruf"] },
{ stem: "zieh", members: ["Umzug", "beziehen", "Anziehung", "abziehen", "Verzug"] }
        ];

        let gameMode = 'easy';
        let activeStems = { 1: null, 2: null, 3: null };
        let draggedEl = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        
        let scoreCalculated = false;
        let finalRoundScore = 0;

        function goHome() {
            if(confirm("Willst du das Spiel wirklich beenden?")) {
                location.reload();
            }
        }

        function startGame(mode) {
            gameMode = mode;
            scoreCalculated = false;
            finalRoundScore = 0;
            document.getElementById('start-screen').style.display = 'none';
            initBoard();
        }

        function initBoard() {
            const forest = document.getElementById('forest');
            const pool = document.getElementById('pool');
            forest.innerHTML = '';
            pool.innerHTML = '';

            // Bäume erstellen
            for (let i = 1; i <= 3; i++) {
                const tree = document.createElement('div');
                tree.className = 'tree';
                let labelText = (gameMode === 'easy') ? families[i-1].stem : "?";
                if(gameMode === 'easy') activeStems[i] = families[i-1].stem;

                tree.innerHTML = `
                    <div class="tree-crown" id="crown-${i}"></div>
                    <div class="tree-trunk">
                        <span class="trunk-label" id="label-${i}">${labelText}</span>
                    </div>
                `;
                forest.appendChild(tree);
            }

            // Blätter mischen
            let leaves = [];
            families.forEach(f => {
                f.members.forEach(m => leaves.push({ text: m, stem: f.stem, type: 'member' }));
                if(gameMode === 'medium') leaves.push({ text: f.stem, stem: f.stem, type: 'stem' });
                if(gameMode === 'hard') leaves.push({ text: f.stem, stem: f.stem, type: 'member' });
            });
            leaves.sort(() => Math.random() - 0.5);

            leaves.forEach((l) => {
                const div = document.createElement('div');
                div.className = 'leaf' + (l.type === 'stem' ? ' stem-leaf' : '');
                div.innerText = l.text;
                div.dataset.stem = l.stem;
                div.dataset.type = l.type;
                div.draggable = true;
                
                div.onmousedown = (e) => startDrag(e, div);
                div.ontouchstart = (e) => startDrag(e, div);
                
                pool.appendChild(div);
            });
        }

        function startDrag(e, el) {
            if (el.classList.contains('correct')) return;
            
            draggedEl = el;
            const evt = e.touches ? e.touches[0] : e;
            const rect = el.getBoundingClientRect();
            
            dragOffsetX = evt.clientX - rect.left;
            dragOffsetY = evt.clientY - rect.top;

            el.style.width = rect.width + 'px';
            el.classList.add('dragging');
            updatePosition(evt.clientX, evt.clientY);
            
            const moveHandler = (moveEvent) => {
                const mEvt = moveEvent.touches ? moveEvent.touches[0] : moveEvent;
                updatePosition(mEvt.clientX, mEvt.clientY);
                if (moveEvent.cancelable) moveEvent.preventDefault();
            };

            const stopHandler = (upEvent) => {
                const uEvt = upEvent.changedTouches ? upEvent.changedTouches[0] : upEvent;
                document.removeEventListener('mousemove', moveHandler);
                document.removeEventListener('mouseup', stopHandler);
                document.removeEventListener('touchmove', moveHandler);
                document.removeEventListener('touchend', stopHandler);
                
                el.classList.remove('dragging');
                el.style.left = ''; el.style.top = ''; el.style.width = '';
                
                const dropTarget = document.elementFromPoint(uEvt.clientX, uEvt.clientY);
                finalizeDrop(el, dropTarget);
            };

            document.addEventListener('mousemove', moveHandler);
            document.addEventListener('mouseup', stopHandler);
            document.addEventListener('touchmove', moveHandler, { passive: false });
            document.addEventListener('touchend', stopHandler);
        }

        function updatePosition(clientX, clientY) {
            if (!draggedEl) return;
            draggedEl.style.left = (clientX - dragOffsetX) + 'px';
            draggedEl.style.top = (clientY - dragOffsetY) + 'px';
        }

        function finalizeDrop(el, target) {
            const crown = target ? target.closest('.tree-crown') : null;
            if (crown) {
                crown.appendChild(el);
            } else {
                document.getElementById('pool').appendChild(el);
            }
            checkPool();
        }

        function checkPool() {
            const pool = document.getElementById('pool');
            document.getElementById('check-btn').style.display = (pool.children.length === 0) ? 'block' : 'none';
        }

        function checkAllTrees() {
            let allCorrect = true;
            let currentAttemptScore = 0;
            const pointsPerTree = (gameMode === 'easy') ? 1 : (gameMode === 'medium' ? 2 : 3);

            for (let i = 1; i <= 3; i++) {
                const crown = document.getElementById(`crown-${i}`);
                if (gameMode === 'medium') {
                    const stemLeaf = Array.from(crown.children).find(l => l.dataset.type === 'stem');
                    activeStems[i] = stemLeaf ? stemLeaf.dataset.stem : null;
                } else if (gameMode === 'hard') {
                    const firstLeaf = crown.children[0];
                    activeStems[i] = firstLeaf ? firstLeaf.dataset.stem : null;
                }
                document.getElementById(`label-${i}`).innerText = activeStems[i] || "?";
            }

            for (let i = 1; i <= 3; i++) {
                const crown = document.getElementById(`crown-${i}`);
                const stem = activeStems[i];
                let treeError = false;

                if (!stem || crown.children.length === 0) {
                    allCorrect = false; treeError = true;
                } else {
                    Array.from(crown.children).forEach(leaf => {
                        if (leaf.dataset.stem === stem) {
                            leaf.classList.add('correct');
                            leaf.classList.remove('wrong');
                            leaf.draggable = false;
                        } else {
                            leaf.classList.add('wrong');
                            allCorrect = false; treeError = true;
                        }
                    });
                }
                if (!treeError && stem) currentAttemptScore += pointsPerTree;
            }

            if (!scoreCalculated) {
                finalRoundScore = currentAttemptScore;
                scoreCalculated = true;
            }

            if (allCorrect) {
                document.getElementById('stars-result').innerText = `Ergebnis: ${finalRoundScore} Sterne! ⭐`;
                document.getElementById('win-screen').style.display = 'flex';
                if (window.parent && window.parent.addStars) window.parent.addStars(finalRoundScore);
            }
        }
    </script>
</body>
</html>
