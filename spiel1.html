<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wortstamm-Baum</title>
    <style>
        :root {
            --primary-green: #4caf50;
            --dark-green: #2e7d32;
            --light-green: #e8f5e9;
            --trunk-brown: #5d4037;
            --accent-gold: #ffc107;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f1f8e9 0%, #dcedc8 100%);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #333;
            touch-action: none;
            overflow: hidden;
        }

        /* */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 2000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .mode-btn {
            background: white; border: 2px solid var(--primary-green); padding: 16px 24px; 
            margin: 10px; width: 85%; max-width: 350px;
            border-radius: 16px; font-size: 1.1rem; font-weight: 800; color: var(--dark-green);
            cursor: pointer; box-shadow: 0 4px 0 var(--primary-green); transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .mode-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--primary-green); }
        .mode-btn span { display: block; font-size: 0.8rem; font-weight: normal; opacity: 0.8; }

        header { padding: 10px; text-align: center; }
        h1 { color: var(--dark-green); margin: 5px 0; font-size: 1.4rem; }

        .leaf-pool-container {
            background: white;
            border-bottom: 4px solid var(--primary-green);
            padding: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            min-height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }

        .leaf-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            width: 100%;
        }

        .leaf {
            background: linear-gradient(135deg, #a5d6a7, #66bb6a);
            color: #1b5e20;
            padding: 8px 16px;
            border-radius: 20px 4px 20px 4px;
            font-weight: 800;
            font-size: 0.85rem;
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            user-select: none;
            touch-action: none;
            white-space: nowrap;
        }

        .leaf.stem-leaf {
            background: linear-gradient(135deg, #8d6e63, #5d4037);
            color: white;
            border: 2px solid var(--accent-gold);
        }

        .leaf.dragging {
            position: fixed !important;
            z-index: 3000;
            opacity: 0.9;
            transform: scale(1.1) rotate(5deg);
            pointer-events: none;
        }

        .leaf.correct { background: #2e7d32 !important; color: white; border-color: transparent; cursor: default; }
        .leaf.wrong { background: #8d6e63 !important; color: #ffeb3b !important; animation: shake 0.4s; }

        #check-btn {
            background: var(--accent-gold);
            color: #5d4037;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 900;
            border-radius: 30px;
            margin-bottom: 10px;
            box-shadow: 0 4px 0 #d4a017;
            cursor: pointer;
            display: none;
        }

        /* */
        .game-area {
            flex: 1;
            display: flex;
            justify-content: space-around;
            align-items: center; 
            padding: 20px 10px 100px 10px; 
            gap: 15px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .tree {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 300px;
        }

        .tree-crown {
            width: 100%;
            aspect-ratio: 1/1;
            background: #4caf50; 
            border-radius: 50%;
            box-shadow: inset 0 -8px 0 rgba(0,0,0,0.1), var(--shadow);
            display: flex;
            flex-wrap: wrap;
            align-content: center;
            justify-content: center;
            padding: 20px;
            gap: 6px;
            position: relative;
            z-index: 1;
        }

        .tree-trunk {
            width: 70px;
            height: 240px; /* 100% länger als das Original */
            background: #5d4037;
            border-radius: 15px 15px 0 0; 
            position: relative;
            margin-top: -30px; 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .trunk-label {
            background: transparent;
            color: white; 
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
            text-align: center;
            padding-bottom: 10px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #win-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 4000;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>Wortstamm-Baum 🌳</h1>
        <button class="mode-btn" onclick="startGame('easy')">LEICHT<span>Stämme sind schon da ⭐</span></button>
        <button class="mode-btn" onclick="startGame('medium')">MITTEL<span>Setze zuerst die braunen Stämme ⭐⭐</span></button>
        <button class="mode-btn" onclick="startGame('hard')">SCHWER<span>Sortiere alles selbst ⭐⭐⭐</span></button>
    </div>

    <header>
        <h1 id="main-title">Wortstamm-Baum</h1>
        <div id="info-text" style="font-weight: bold; color: var(--dark-green);">Ziehe die Blätter nach unten auf die Bäume.</div>
    </header>

    <!-- -->
    <div class="leaf-pool-container">
        <button id="check-btn" onclick="checkAllTrees()">Bäume prüfen! 🔍</button>
        <div class="leaf-pool" id="pool"></div>
    </div>

    <div class="game-area" id="forest"></div>
    
    <div id="win-screen">
        <h1 style="font-size: 3rem;">🌳</h1>
        <h2 style="color: var(--dark-green);">Baum-Profi!</h2>
        <div id="stars-result" style="font-size: 2.5rem; color: #fbc02d; margin: 20px 0;"></div>
        <button class="mode-btn" style="background: var(--primary-green); color: white;" onclick="finishGame()">Belohnung & Zurück</button>
    </div>

    <script>
        /* */
        const families = [
            { stem: "fahr", members: ["Fahrrad", "Gefahr", "Abfahrt", "Fahrbahn", "beifahren"] },
            { stem: "spiel", members: ["Spielplatz", "Mitspieler", "Vorspiel", "verspielt", "Spielfigur"] },
            { stem: "lauf", members: ["Laufschuh", "Eislaufen", "Verlauf", "Wettlauf", "anlaufen"] }
        ];

        let gameMode = 'easy';
        let activeStems = { 1: null, 2: null, 3: null };
        let draggedEl = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        
        let scoreCalculated = false;
        let finalRoundScore = 0;

        function startGame(mode) {
            gameMode = mode;
            scoreCalculated = false;
            finalRoundScore = 0;
            document.getElementById('start-screen').style.display = 'none';
            initBoard();
        }

        function initBoard() {
            const forest = document.getElementById('forest');
            const pool = document.getElementById('pool');
            forest.innerHTML = '';
            pool.innerHTML = '';

            for (let i = 1; i <= 3; i++) {
                const tree = document.createElement('div');
                tree.className = 'tree';
                
                let labelText = (gameMode === 'easy') ? families[i-1].stem : "?";
                if(gameMode === 'easy') activeStems[i] = families[i-1].stem;

                tree.innerHTML = `
                    <div class="tree-crown" id="crown-${i}"></div>
                    <div class="tree-trunk">
                        <span class="trunk-label" id="label-${i}">${labelText}</span>
                    </div>
                `;
                forest.appendChild(tree);
            }

            let leaves = [];
            families.forEach(f => {
                f.members.forEach(m => leaves.push({ text: m, stem: f.stem, type: 'member' }));
                if(gameMode === 'medium') leaves.push({ text: f.stem, stem: f.stem, type: 'stem' });
                if(gameMode === 'hard') leaves.push({ text: f.stem, stem: f.stem, type: 'member' });
            });
            leaves.sort(() => Math.random() - 0.5);

            leaves.forEach((l) => {
                const div = document.createElement('div');
                div.className = 'leaf' + (l.type === 'stem' ? ' stem-leaf' : '');
                div.innerText = l.text;
                div.dataset.stem = l.stem;
                div.dataset.type = l.type;
                
                div.onmousedown = (e) => startDrag(e, div);
                div.ontouchstart = (e) => startDrag(e, div);
                
                pool.appendChild(div);
            });
        }

        /* */
        function startDrag(e, el) {
            if (el.classList.contains('correct')) return;
            
            draggedEl = el;
            const evt = e.touches ? e.touches[0] : e;
            const rect = el.getBoundingClientRect();
            
            dragOffsetX = evt.clientX - rect.left;
            dragOffsetY = evt.clientY - rect.top;

            el.style.width = rect.width + 'px';
            el.classList.add('dragging');
            updatePosition(evt.clientX, evt.clientY);
            
            const moveHandler = (moveEvent) => {
                const mEvt = moveEvent.touches ? moveEvent.touches[0] : moveEvent;
                updatePosition(mEvt.clientX, mEvt.clientY);
                if (moveEvent.cancelable) moveEvent.preventDefault();
            };

            const stopHandler = (upEvent) => {
                const uEvt = upEvent.changedTouches ? upEvent.changedTouches[0] : upEvent;
                document.removeEventListener('mousemove', moveHandler);
                document.removeEventListener('mouseup', stopHandler);
                document.removeEventListener('touchmove', moveHandler);
                document.removeEventListener('touchend', stopHandler);
                
                el.classList.remove('dragging');
                el.style.left = '';
                el.style.top = '';
                el.style.width = '';
                
                const dropTarget = document.elementFromPoint(uEvt.clientX, uEvt.clientY);
                finalizeDrop(el, dropTarget);
            };

            document.addEventListener('mousemove', moveHandler);
            document.addEventListener('mouseup', stopHandler);
            document.addEventListener('touchmove', moveHandler, { passive: false });
            document.addEventListener('touchend', stopHandler);
        }

        function updatePosition(clientX, clientY) {
            if (!draggedEl) return;
            draggedEl.style.left = (clientX - dragOffsetX) + 'px';
            draggedEl.style.top = (clientY - dragOffsetY) + 'px';
        }

        function finalizeDrop(el, target) {
            const crown = target ? target.closest('.tree-crown') : null;
            if (crown) {
                crown.appendChild(el);
            } else {
                document.getElementById('pool').appendChild(el);
            }
            checkPool();
        }

        function checkPool() {
            const pool = document.getElementById('pool');
            document.getElementById('check-btn').style.display = (pool.children.length === 0) ? 'block' : 'none';
        }

        /* */
        function checkAllTrees() {
            let allCorrect = true;
            let currentAttemptScore = 0;
            const pointsPerTree = (gameMode === 'easy') ? 1 : (gameMode === 'medium' ? 2 : 3);

            // 1. Stämme ermitteln
            for (let i = 1; i <= 3; i++) {
                const crown = document.getElementById(`crown-${i}`);
                if (gameMode === 'medium') {
                    const stemLeaf = Array.from(crown.children).find(l => l.dataset.type === 'stem');
                    activeStems[i] = stemLeaf ? stemLeaf.dataset.stem : null;
                } else if (gameMode === 'hard') {
                    const firstLeaf = crown.children[0];
                    activeStems[i] = firstLeaf ? firstLeaf.dataset.stem : null;
                }
                document.getElementById(`label-${i}`).innerText = activeStems[i] || "?";
            }

            // 2. Bäume prüfen
            for (let i = 1; i <= 3; i++) {
                const crown = document.getElementById(`crown-${i}`);
                const stem = activeStems[i];
                let treeError = false;

                if (!stem || crown.children.length === 0) {
                    allCorrect = false;
                    treeError = true;
                } else {
                    Array.from(crown.children).forEach(leaf => {
                        if (leaf.dataset.stem === stem) {
                            leaf.classList.add('correct');
                            leaf.classList.remove('wrong');
                            // Sperre das Blatt, damit es nicht mehr bewegt werden kann
                        } else {
                            leaf.classList.add('wrong');
                            allCorrect = false;
                            treeError = true;
                        }
                    });
                }
                // Wenn dieser Baum aktuell fehlerfrei ist, addiere Punkte für den aktuellen Versuch
                if (!treeError && stem) currentAttemptScore += pointsPerTree;
            }

            // PUNKTE-FREEZE: Nur beim ersten Mal werten
            if (!scoreCalculated) {
                finalRoundScore = currentAttemptScore;
                scoreCalculated = true;
            }

            if (allCorrect) {
                document.getElementById('stars-result').innerText = `Ergebnis: ${finalRoundScore} Sterne! ⭐`;
                document.getElementById('win-screen').style.display = 'flex';
            } else {
                const info = document.getElementById('info-text');
                info.innerText = "Oje! Manche Blätter sind braun geworden. Hänge sie an den richtigen Baum!";
                info.style.color = "#8d6e63";
            }
        }

        function finishGame() {
            if (window.parent && window.parent.addStars) window.parent.addStars(finalRoundScore);
            location.reload();
        }
    </script>
</body>
</html>
