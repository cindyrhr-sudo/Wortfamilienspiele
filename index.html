<main id="app-container">
    <!-- Dashboard / Startseite -->
    <section id="menu-view">
        
        <div class="dashboard-layout">
            
            <!-- Linke Seite: Die Karte -->
            <div class="map-section">
                <h2>Deine Schatzkarte</h2>
                <div id="map-container">
                    <!-- Bild wird via CSS geladen, Stationen via JS -->
                </div>
            </div>

            <!-- Rechte Seite: Steuerung & Inventar -->
            <div class="controls-section">
                
                <div class="inventory">
                    <h3>Deine Tasche</h3>
                    <div id="inventory-list"></div>
                </div>

                <div class="game-selection">
                    <h3>Sterne verdienen:</h3>
                    <div class="grid">
                        <button class="game-card" onclick="loadGame('markieren')">
                            <h3>🔍 Wortstamm-Markierer</h3>
                        </button>
                        <!-- Platz für weitere Spiele-Buttons -->
                    </div>
                </div>

            </div> <!-- Ende controls-section -->
        </div> <!-- Ende dashboard-layout -->

    </section>

    <!-- Spiel-Bereich bleibt gleich -->
    <section id="game-view" class="hidden">
        <button onclick="showMenu()" class="back-btn">⬅ Zurück zur Karte</button>
        <div id="game-content"></div>
    </section>
</main>
