<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wort-Abenteuer: Entdecker-Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --accent: #fbbf24;
            --bg-body: #dbeafe;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        html { font-size: 110%; }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-body);
            color: #1e293b;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 2px solid #cbd5e1;
        }

        .map-viewport {
            flex: 1.5;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .map-wrapper {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        #map-container {
            position: relative;
            height: 100%;
            width: auto;
            aspect-ratio: 3 / 4;
            background-color: #f3e5ab;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            border: 10px solid #e7d8c1;
            border-radius: 24px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.3);
            min-height: 200px;
            background-image: url('karte.png');
        }

        .station {
            position: absolute;
            width: 14%;
            height: 10%;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transform: translate(-50%, -50%);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .station:hover { transform: translate(-50%, -50%) scale(1.15); }

        .mini-chest {
            position: absolute;
            top: -12px;
            right: -12px;
            font-size: 1.54rem;
            background: #fcd34d;
            border: 2px solid white;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            animation: float 2s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .item-slot {
            background: white;
            padding: 6px 12px;
            border-radius: 14px;
            border: 2px solid #e2e8f0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin: 3px;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
        }

        .game-card-modern {
            transition: all 0.2s ease;
            border: 2px solid transparent;
            border-bottom-width: 4px;
        }
        .game-card-modern:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        .flying-gem {
            position: fixed;
            z-index: 5000;
            pointer-events: none;
            font-size: 2.2rem;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body>

    <header class="bg-slate-800 px-6 py-3 flex justify-between items-center shadow-lg z-50 text-white">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <span class="bg-emerald-500 p-1.5 rounded-lg text-2xl">🏝️</span> Wort-Abenteuer
        </h1>
        <div class="flex gap-4 items-center">
            <div class="bg-slate-700 text-emerald-400 px-4 py-1 rounded-xl font-bold text-xs border border-slate-600 uppercase tracking-widest">
                Insel <span id="current-map-num" class="text-lg ml-1">1</span>
            </div>
            <div class="bg-amber-400 text-amber-950 px-5 py-1.5 rounded-xl font-bold shadow-inner text-lg flex items-center gap-2">
                <span id="points">0</span> <span>⭐</span>
            </div>
        </div>
    </header>

    <main class="flex-1 flex p-4 gap-4 overflow-hidden">
        
        <section class="map-viewport glass-card p-4">
            <h2 class="text-xs font-bold mb-2 text-slate-500 text-center uppercase tracking-[0.2em]" id="island-name">Geheimnisvolle Insel</h2>
            <div class="map-wrapper">
                <div id="map-container">
                    <!-- Stationen werden via JS geladen -->
                </div>
            </div>
        </section>

        <section class="flex-1 flex flex-col gap-4 overflow-y-auto pr-1">
            
            <div class="glass-card p-5 border-l-8 border-emerald-500">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-bold text-slate-800 flex items-center gap-2">🎒 Dein Rucksack</h3>
                    <button onclick="resetGame()" class="text-[11px] uppercase font-bold text-slate-400 hover:text-red-500">Reset ♻️</button>
                </div>
                <div id="inventory-list" class="flex flex-wrap gap-2 min-h-[50px]">
                    <p class="text-slate-400 text-xs italic">Noch leer...</p>
                </div>
            </div>

            <div class="glass-card p-5">
                <h3 class="font-bold text-slate-500 mb-4 text-[12px] uppercase tracking-widest">Wähle eine Mission</h3>
                <div class="space-y-3">
                    <button class="w-full game-card-modern bg-emerald-100 border-emerald-300 p-3 rounded-xl flex items-center gap-3 text-left" onclick="loadGame('spiel1.html')">
                        <div class="text-2xl bg-white p-2 rounded-lg shadow-sm">🌳</div>
                        <div>
                            <div class="font-bold text-emerald-900 text-base leading-tight">Wortstamm-Baum</div>
                            <div class="text-[12px] text-emerald-700">Level 1 • Einfach</div>
                        </div>
                    </button>
                    
                    <button class="w-full game-card-modern bg-orange-100 border-orange-300 p-3 rounded-xl flex items-center gap-3 text-left" onclick="loadGame('spiel2.html')">
                        <div class="text-2xl bg-white p-2 rounded-lg shadow-sm">🧪</div>
                        <div>
                            <div class="font-bold text-orange-900 text-base leading-tight">Wort-Labor</div>
                            <div class="text-[12px] text-orange-700">Level 2 • Normal</div>
                        </div>
                    </button>

                    <button class="w-full game-card-modern bg-pink-100 border-pink-300 p-3 rounded-xl flex items-center gap-3 text-left" onclick="loadGame('spiel3.html')">
                        <div class="text-2xl bg-white p-2 rounded-lg shadow-sm">🔍</div>
                        <div>
                            <div class="font-bold text-pink-900 text-base leading-tight">Eindringlinge</div>
                            <div class="text-[12px] text-pink-700">Level 3 • Wortfamilien</div>
                        </div>
                    </button>

                    <button class="w-full game-card-modern bg-sky-100 border-sky-300 p-3 rounded-xl flex items-center gap-3 text-left" onclick="loadGame('spiel4.html')">
                        <div class="text-2xl bg-white p-2 rounded-lg shadow-sm">📖</div>
                        <div>
                            <div class="font-bold text-sky-900 text-base leading-tight">Lese-Profi</div>
                            <div class="text-[12px] text-sky-700">Level 4 • Mittel</div>
                        </div>
                    </button>

                    <button class="w-full game-card-modern bg-amber-100 border-amber-300 p-3 rounded-xl flex items-center gap-3 text-left" onclick="loadGame('spiel5.html')">
                        <div class="text-2xl bg-white p-2 rounded-lg shadow-sm">✨</div>
                        <div>
                            <div class="font-bold text-amber-900 text-base italic leading-tight">Bonus-Arena</div>
                            <div class="text-[12px] text-amber-700">Sterne sammeln!</div>
                        </div>
                    </button>
                </div>
            </div>
        </section>

        <section id="game-view" class="hidden fixed inset-0 bg-slate-900/95 z-[200] flex flex-col p-4 backdrop-blur-md">
            <div class="flex justify-between items-center mb-4">
                <button onclick="showMenu()" class="bg-red-500 text-white px-6 py-2 rounded-xl font-bold shadow-lg active:scale-95 text-lg">⬅ ZURÜCK</button>
                <div class="font-bold text-white opacity-50 uppercase text-xs tracking-widest">Abenteuer aktiv...</div>
            </div>
            <iframe id="game-frame" class="flex-1 w-full rounded-2xl border-none bg-white shadow-2xl"></iframe>
        </section>
    </main>

    <div id="win-overlay" class="hidden fixed inset-0 bg-slate-900/90 z-[1000] flex items-center justify-center p-6 text-center backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[32px] max-w-sm shadow-2xl border-4 border-emerald-400">
            <h2 class="text-2xl font-bold mb-2 text-slate-800">Insel geschafft! 🎉</h2>
            <p class="text-slate-600 mb-6 text-sm font-medium">Du hast alle Schätze auf dieser Insel gehoben!</p>
            <span id="reward-emoji" class="text-7xl block mb-8 drop-shadow-lg">💎</span>
            <button onclick="startNextMap()" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-bold text-lg hover:bg-emerald-600 transition-all shadow-lg active:translate-y-1">
                Nächste Insel ⛵
            </button>
        </div>
    </div>

    <script>
        const mapImages = ['karte.png', 'karte2.png', 'karte3.png', 'karte4.png', 'karte5.png'];
        const masterTreasures = ["🏆", "👑", "🦄", "💍", "🔱", "🧿", "✨", "🌈", "🗿"];
        const gemEmojis = ["💎", "🪙", "🐚", "🧚"];

        const initialStations = [
            { id: 1,  name: "Schiff", status: "locked", emoji: "🚢",  top: "93%",   left: "24.7%" },
            { id: 2,  name: "Strand", status: "locked", emoji: "🐚",  top: "86%",   left: "63.4%" },
            { id: 3,  name: "Vulkan", status: "locked", emoji: "🌋",  top: "70%",   left: "85%"   },
            { id: 4,  name: "Stein",  status: "locked", emoji: "🪨",  top: "64%",   left: "51%"   },
            { id: 5,  name: "Berg",   status: "locked", emoji: "🏔️", top: "56%", left: "21%"   },
            { id: 6,  name: "Höhle",  status: "locked", emoji: "🗻",  top: "43%",   left: "41%"   },
            { id: 7,  name: "See",    status: "locked", emoji: "🏞️", top: "38%",   left: "70%"   },
            { id: 8,  name: "Wald",   status: "locked", emoji: "🌳",  top: "23%",   left: "88%"   },
            { id: 9,  name: "Hütte",  status: "locked", emoji: "🛖",  top: "17%",   left: "64%"   },
            { id: 10, name: "Schatz", status: "locked", emoji: "🪙",  top: "15%",   left: "34.5%" }
        ];

        const initialGameState = {
            points: 50,
            mapLevel: 1,
            stations: JSON.parse(JSON.stringify(initialStations)),
            inventory: []
        };

        let gameState = JSON.parse(localStorage.getItem('wortAbenteuerState')) || initialGameState;

        // FIX 1: Robuste Stations-Synchronisation per ID statt per Array-Länge.
        // Fehlende Stationen werden ergänzt, veraltete Koordinaten/Emojis aktualisiert.
        initialStations.forEach(is => {
            const existing = gameState.stations.find(s => s.id === is.id);
            if (!existing) {
                gameState.stations.push(JSON.parse(JSON.stringify(is)));
            } else {
                // Koordinaten und Emojis immer aus initialStations übernehmen,
                // damit Code-Updates sofort greifen (nur Status bleibt erhalten).
                existing.top   = is.top;
                existing.left  = is.left;
                existing.emoji = is.emoji;
                existing.name  = is.name;
            }
        });
        gameState.stations.sort((a, b) => a.id - b.id);

        window.loadGame = function(url) {
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('game-frame').src = url;
        };

        window.showMenu = function() {
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('game-frame').src = "about:blank";
            renderMap();
        };

        function renderMap() {
            const container = document.getElementById('map-container');
            const imgIdx = (gameState.mapLevel - 1) % mapImages.length;
            container.style.backgroundImage = `url('${mapImages[imgIdx]}')`;

            container.innerHTML = gameState.stations.map(s => `
                <div class="station ${s.status}" data-station-id="${s.id}" style="top: ${s.top}; left: ${s.left};">
                    <div class="relative" onclick="handleStationClick(${s.id}, 'station')">
                        <div class="text-3xl drop-shadow-md">
                            ${s.status === 'opened' || s.status === 'unlocked' ? s.emoji : '🔒'}
                        </div>
                        ${s.status === 'unlocked' ? `<div class="mini-chest" onclick="event.stopPropagation(); handleStationClick(${s.id}, 'chest')">🎁</div>` : ''}
                    </div>
                    <span class="text-[10px] font-bold bg-white/90 px-1.5 py-0.5 rounded shadow-sm whitespace-nowrap mt-1 border border-slate-200">${s.name}</span>
                </div>
            `).join('');
        }

        window.handleStationClick = function(id, targetType) {
            const s = gameState.stations.find(st => st.id === id);
            if (targetType === 'station' && s.status === 'locked') {
                if (confirm(`${s.name} entdecken? (20 Sterne)`)) unlockStation(id);
            } else if (targetType === 'chest' && s.status === 'unlocked') {
                if (confirm(`Truhe öffnen? (10 Sterne)`)) openChest(id);
            }
        };

        function unlockStation(id) {
            if (gameState.points >= 20) {
                gameState.points -= 20;
                gameState.stations.find(st => st.id === id).status = 'unlocked';
                saveAndRefresh();
            } else {
                alert("Nicht genug Sterne! Spiele eine Mission, um welche zu sammeln.");
            }
        }

        function openChest(id) {
            if (gameState.points >= 10) {
                gameState.points -= 10;
                const stationEl = document.querySelector(`[data-station-id="${id}"] .mini-chest`);
                if (stationEl) animateGemsToInventory(stationEl);

                gameState.stations.find(st => st.id === id).status = 'opened';

                setTimeout(() => {
                    gameState.inventory.push("💎");
                    saveAndRefresh();
                    checkMapCompletion();
                }, 850);
            } else {
                alert("Nicht genug Sterne!");
            }
        }

        function animateGemsToInventory(sourceEl) {
            const startRect = sourceEl.getBoundingClientRect();
            const invHeader = document.querySelector('h3');
            const endRect = invHeader.getBoundingClientRect();
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const gem = document.createElement('div');
                    gem.className = 'flying-gem';
                    gem.innerText = gemEmojis[Math.floor(Math.random() * gemEmojis.length)];
                    gem.style.left = startRect.left + 'px';
                    gem.style.top = startRect.top + 'px';
                    document.body.appendChild(gem);
                    requestAnimationFrame(() => {
                        gem.style.left = (endRect.left + 20) + 'px';
                        gem.style.top = (endRect.top + 10) + 'px';
                        gem.style.transform = 'scale(0.3) rotate(360deg)';
                        gem.style.opacity = '0';
                    });
                    setTimeout(() => gem.remove(), 800);
                }, i * 150);
            }
        }

        function updateUI() {
            document.getElementById('points').innerText = gameState.points;
            document.getElementById('current-map-num').innerText = ((gameState.mapLevel - 1) % 5) + 1;
            const invList = document.getElementById('inventory-list');
            if (gameState.inventory.length > 0) {
                const counts = {};
                gameState.inventory.forEach(item => { counts[item] = (counts[item] || 0) + 1; });
                invList.innerHTML = Object.keys(counts).map(key => `
                    <div class="item-slot">
                        <span class="text-lg">${key}</span>
                        ${counts[key] > 1 ? `<span class="text-xs font-bold text-emerald-600">x${counts[key]}</span>` : ''}
                    </div>
                `).join('');
            } else {
                invList.innerHTML = '<p class="text-slate-400 text-xs italic">Sammle Schätze...</p>';
            }
        }

        function checkMapCompletion() {
            if (gameState.stations.every(st => st.status === 'opened')) {
                const randomTreasure = masterTreasures[Math.floor(Math.random() * masterTreasures.length)];
                document.getElementById('reward-emoji').innerText = randomTreasure;
                // FIX 2: Master-Schatz sofort speichern, damit er nach Reload erhalten bleibt.
                gameState.inventory.push(randomTreasure);
                saveAndRefresh();
                document.getElementById('win-overlay').classList.remove('hidden');
            }
        }

        window.startNextMap = function() {
            gameState.mapLevel++;
            // FIX 3: Stationen komplett aus initialStations neu aufbauen,
            // damit aktualisierte Positionen aus dem Code übernommen werden.
            gameState.stations = JSON.parse(JSON.stringify(initialStations));
            document.getElementById('win-overlay').classList.add('hidden');
            saveAndRefresh();
        };

        window.resetGame = function() {
            if (confirm("Möchtest du wirklich alles zurücksetzen?")) {
                gameState = JSON.parse(JSON.stringify(initialGameState));
                localStorage.removeItem('wortAbenteuerState');
                saveAndRefresh();
            }
        };

        function saveAndRefresh() {
            localStorage.setItem('wortAbenteuerState', JSON.stringify(gameState));
            updateUI();
            renderMap();
        }

        window.addStars = function(amount) {
            gameState.points += parseInt(amount) || 0;
            saveAndRefresh();
        };

        window.onload = () => { renderMap(); updateUI(); };
    </script>
</body>
</html>
