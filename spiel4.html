<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Wortarten-Regen Abenteuer 🌈</title>
    <style>
        :root {
            --bg-sky: #e0f2fe;
            --bg-ground: #f0fdf4;
            --accent-yellow: #facc15;
            --accent-orange: #fb923c;
            --error-soft-red: #fca5a5;
            --text-dark: #1e293b;
            
            /* Wortarten Farben */
            --color-nomen: #ff6b6b;
            --color-verb: #4dadff;
            --color-adjektiv: #51cf66;
            --color-artikel: #fcc419;
            --color-praeposition: #cc5de8;
            --color-pronomen: #ff922b;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(to bottom, var(--bg-sky) 0%, var(--bg-ground) 100%);
            margin: 0;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh; 
            height: 100dvh; /* Nutzt die dynamische Viewport-Höhe für Mobile */
            overflow: hidden; 
            color: var(--text-dark); 
            touch-action: none;
        }

        .screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #ffffff 0%, #e0f2fe 100%);
            z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 1.5rem;
        }

        .hidden { display: none !important; }

        .config-section {
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(10px);
            padding: 1.5rem; 
            border-radius: 2rem; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            margin-bottom: 1.5rem; 
            width: 95%; 
            max-width: 650px;
            border: 4px solid white;
        }

        .checkbox-group { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 0.75rem; 
            margin-top: 1rem; 
        }
        
        .chip {
            padding: 0.8rem 1.2rem; 
            border: 3px solid #cbd5e1; 
            border-radius: 1.2rem;
            cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            font-weight: 800; 
            background: white; 
            font-size: clamp(0.9rem, 2.5vw, 1.1rem); 
            color: #64748b;
            box-shadow: 0 4px 0 #cbd5e1;
            user-select: none;
        }

        .chip.active { 
            background: var(--accent-orange); 
            color: white; 
            border-color: #e67e22; 
            transform: translateY(2px); 
            box-shadow: 0 2px 0 #d35400; 
        }

        .mode-btn {
            background: #20c997; 
            border: none; 
            padding: 1.2rem 2rem; 
            width: 90%; 
            max-width: 350px;
            border-radius: 2rem; 
            font-size: clamp(1.2rem, 4vw, 1.8rem); 
            font-weight: 900; 
            color: white;
            cursor: pointer; 
            box-shadow: 0 8px 0 #12b886; 
            transition: all 0.1s;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
        }
        .mode-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #12b886; }

        #game-area {
            position: relative; width: 100%; height: 100%; overflow: hidden;
            display: flex; flex-direction: column;
        }

        #ui-layer {
            display: flex; justify-content: space-between; align-items: center; 
            width: 100%; padding: 1rem; z-index: 100; pointer-events: none;
        }

        .stats-badge {
            background: white; padding: 0.6rem 1.2rem; border-radius: 1.5rem;
            font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            pointer-events: auto; font-size: 1.2rem; border: 3px solid #f1f5f9;
        }

        .falling-word {
            position: absolute; background: white; padding: 0.8rem 1.5rem;
            border: 4px solid #e2e8f0; border-radius: 3rem;
            font-weight: 900; font-size: clamp(1.1rem, 3vw, 1.5rem); 
            cursor: grab; box-shadow: 0 6px 12px rgba(0,0,0,0.1); 
            user-select: none; touch-action: none; z-index: 50; white-space: nowrap;
        }

        .falling-word::after {
            content: ''; position: absolute; bottom: -8px; left: 20%; width: 15px; height: 15px;
            background: white; border-radius: 50%; box-shadow: 15px 4px 0 -2px white;
        }

        #baskets-container {
            position: absolute; bottom: 0; width: 100%; 
            display: flex; justify-content: center; align-items: flex-end;
            gap: 0.5rem; padding: 1rem; box-sizing: border-box;
            pointer-events: none; flex-wrap: nowrap;
        }

        .basket {
            flex: 1; 
            min-width: 60px;
            max-width: 150px; 
            height: clamp(80px, 15vh, 130px); 
            background: white; 
            border: 5px solid #e2e8f0; 
            border-radius: 1.5rem; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 900; color: white;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative; box-shadow: 0 6px 0 rgba(0,0,0,0.1);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            font-size: clamp(0.7rem, 2vw, 1rem);
        }

        .basket span:first-child { font-size: clamp(1.2rem, 4vw, 2rem); }

        /* Wortarten Farben */
        .basket[data-type="Nomen"] { background: var(--color-nomen); border-color: #fa5252; }
        .basket[data-type="Verb"] { background: var(--color-verb); border-color: #339af0; }
        .basket[data-type="Adjektiv"] { background: var(--color-adjektiv); border-color: #40c057; }
        .basket[data-type="Artikel"] { background: var(--color-artikel); border-color: #fab005; }
        .basket[data-type="Präposition"] { background: var(--color-praeposition); border-color: #be4bdb; }
        .basket[data-type="Pronomen"] { background: var(--color-pronomen); border-color: #fd7e14; }

        .basket.highlight { transform: scale(1.1) translateY(-10px); z-index: 10; }

        #feedback-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 2rem; border-radius: 2.5rem; 
            border: 8px solid var(--accent-orange);
            z-index: 3000; text-align: center; width: 90%; max-width: 450px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        #admin-btn { position: fixed; bottom: 5px; right: 5px; opacity: 0.1; font-size: 0.6rem; z-index: 4000; border: none; background: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen">
        <div style="font-size: 4rem; margin-bottom: 0.5rem;">☁️</div>
        <h1 style="font-size: clamp(2rem, 8vw, 3.5rem); margin: 0; color: #0f172a;">Wortarten-Regen</h1>
        <p style="font-size: 1.2rem; color: #475569; margin-bottom: 2rem; font-weight: 600;">Fang die Wörter, leg sie in die richtigen Körbe 🧺</p>
        
        <div class="config-section">
            <strong style="display: block; font-size: 1.1rem;">Was möchtest du heute üben?</strong>
            <div class="checkbox-group" id="type-chips">
                <div class="chip active" data-type="Nomen">Nomen</div>
                <div class="chip active" data-type="Verb">Verben</div>
                <div class="chip active" data-type="Adjektiv">Adjektive</div>
                <div class="chip" data-type="Präposition">Präposition - Vom/Auf...</div>
                <div class="chip" data-type="Pronomen">Pronomen - Ich/Mein...</div>
                <div class="chip" data-type="Artikel">Artikel</div>
            </div>
        </div>

        <div class="config-section">
            <strong style="display: block; font-size: 1.1rem;">Wie schnell soll es regnen?</strong>
            <div class="checkbox-group" id="speed-chips">
                <div class="chip active" data-speed="slow">🐢 Gemütlich</div>
                <div class="chip" data-speed="medium">🐰 Flott</div>
                <div class="chip" data-speed="fast">🚀 Superfix</div>
            </div>
        </div>

        <button class="mode-btn" onclick="game.init()">Ab ins Abenteuer! 🌈</button>
    </div>

    <div id="game-area" class="hidden">
        <div id="ui-layer">
            <button onclick="game.cancelGame()" style="background: white; border: none; font-size: 2rem; border-radius: 50%; width: 50px; height: 50px; box-shadow: 0 4px 0 #ddd; cursor: pointer; pointer-events: auto;">🏠</button>
            <div style="display: flex; gap: 0.75rem;">
                <div class="stats-badge" id="timer-display">60s</div>
                <div class="stats-badge" id="points-display" style="background: var(--accent-yellow); color: white; border-color: #eab308;">⭐ 0</div>
            </div>
        </div>
        <div id="baskets-container"></div>
    </div>

    <div id="feedback-modal" class="hidden">
        <div style="font-size: 3rem; margin-bottom: 0.5rem;">💡</div>
        <h2 style="color: var(--accent-orange); font-size: 2rem; margin-top: 0;">Fast richtig!</h2>
        <div id="error-content" style="font-size: 1.2rem; line-height: 1.5; margin-bottom: 2rem;"></div>
        <button class="mode-btn" style="background: #475569; width: 100%;" onclick="game.resume()">Ich versuch's nochmal! 💪</button>
    </div>

    <div id="win-screen" class="screen hidden">
        <div style="font-size: 4rem;">🏆</div>
        <h1 style="font-size: 2.5rem;">Super gemacht!</h1>
        <div id="final-stars" style="font-size: 5rem; color: #fbbf24; margin: 1rem; font-weight: 900;">⭐ 0</div>
        <p id="final-msg" style="font-size: 1.5rem; color: #64748b; margin-bottom: 2rem; font-weight: 600;"></p>
        <button class="mode-btn" onclick="game.saveAndExit()">Sterne einsammeln! ✨</button>
    </div>

    <button id="admin-btn" onclick="game.openAdmin()">⚙️</button>

        class WordGame {
            constructor() {
                this.db = JSON.parse(localStorage.getItem('regen_db_v2')) || INITIAL_DATABASE;
                this.stars = 0;
                this.correctWordCounter = 0; 
                this.timeLeft = 60;
                this.activeTypes = [];
                this.speedMode = 'slow';
                this.activeWords = [];
                this.gameRunning = false;
                this.timerInterval = null;
                
                this.setupChips();
                window.addEventListener('resize', () => this.handleResize());
            }

            setupChips() {
                document.querySelectorAll('.chip').forEach(chip => {
                    chip.onclick = (e) => {
                        const isSpeed = e.target.parentElement.id === 'speed-chips';
                        if(isSpeed) {
                            e.target.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                            e.target.classList.add('active');
                        } else {
                            e.target.classList.toggle('active');
                        }
                    };
                });
            }

            handleResize() {
                // Verhindert, dass Wörter außerhalb des sichtbaren Bereichs hängen bleiben
                this.activeWords.forEach(w => {
                    const maxPos = window.innerWidth - w.el.offsetWidth - 20;
                    if (w.x > maxPos) {
                        w.x = Math.max(10, maxPos);
                        w.el.style.left = w.x + 'px';
                    }
                });
            }

            init() {
                this.activeTypes = Array.from(document.querySelectorAll('#type-chips .chip.active')).map(c => {
                    const t = c.innerText;
                    if(t.includes("Vom")) return "Präposition";
                    if(t.includes("Ich")) return "Pronomen";
                    if(t.includes("Der")) return "Artikel";
                    return c.dataset.type;
                });
                this.speedMode = document.querySelector('#speed-chips .chip.active').dataset.speed;

                if(this.activeTypes.length === 0) return;

                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('game-area').classList.remove('hidden');
                
                this.renderBaskets();
                this.startGame();
            }

            renderBaskets() {
                const container = document.getElementById('baskets-container');
                container.innerHTML = '';
                this.activeTypes.forEach(type => {
                    const b = document.createElement('div');
                    b.className = 'basket';
                    let icon = "❓";
                    if(type === "Nomen") icon = "🍎";
                    if(type === "Verb") icon = "🏃";
                    if(type === "Adjektiv") icon = "🎨";
                    if(type === "Artikel") icon = "✨";
                    if(type === "Präposition") icon = "📍";
                    if(type === "Pronomen") icon = "👥";

                    b.innerHTML = `<span>${icon}</span><span>${type}</span>`;
                    b.dataset.type = type;
                    container.appendChild(b);
                });
            }

            startGame() {
                this.gameRunning = true;
                this.timeLeft = 60;
                this.stars = 0;
                this.correctWordCounter = 0; 
                this.updateUI();
                
                if(this.timerInterval) clearInterval(this.timerInterval);
                this.timerInterval = setInterval(() => {
                    if(!this.gameRunning) return;
                    this.timeLeft--;
                    this.updateUI();
                    if(this.timeLeft <= 0) this.endGame();
                }, 1000);

                this.gameLoop();
            }

            updateUI() {
                document.getElementById('timer-display').innerText = `${this.timeLeft}s`;
                document.getElementById('points-display').innerText = `⭐ ${this.stars}`;
            }

            gameLoop() {
                if(!this.gameRunning) return;

                let fallSpeed = 1.2; 
                let spawnLimit = 1;

                if(this.speedMode === 'medium') { fallSpeed = 1.8; spawnLimit = 2; } 
                else if(this.speedMode === 'fast') { fallSpeed = 2.6; spawnLimit = 3; }

                if(this.activeWords.length < spawnLimit) this.spawn();

                this.activeWords.forEach((w, idx) => {
                    if(!w.isDragging) {
                        w.y += fallSpeed;
                        w.el.style.top = w.y + 'px';
                        if(w.y > window.innerHeight - 100) this.removeWord(idx);
                    }
                });

                requestAnimationFrame(() => this.gameLoop());
            }

            spawn() {
                const pool = this.db.filter(item => this.activeTypes.includes(item.type));
                if(pool.length === 0) return;
                
                const data = pool[Math.floor(Math.random() * pool.length)];
                const el = document.createElement('div');
                el.className = 'falling-word';
                el.innerText = data.text;
                document.getElementById('game-area').appendChild(el);

                const wordWidth = el.offsetWidth || 150;
                const obj = {
                    el, data,
                    x: Math.random() * (window.innerWidth - wordWidth - 40) + 20,
                    y: -100,
                    isDragging: false
                };

                el.style.left = obj.x + 'px';
                this.bindDrag(obj);
                this.activeWords.push(obj);
            }

            bindDrag(w) {
                const onStart = (e) => {
                    if(!this.gameRunning) return;
                    w.isDragging = true;
                    w.el.style.zIndex = 1000;
                    w.el.style.cursor = 'grabbing';
                };

                const onMove = (e) => {
                    if(!w.isDragging) return;
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    
                    w.x = clientX - w.el.offsetWidth / 2;
                    w.y = clientY - w.el.offsetHeight / 2;
                    
                    w.el.style.left = w.x + 'px';
                    w.el.style.top = w.y + 'px';
                    this.highlightBasket(clientX, clientY);
                };

                const onEnd = (e) => {
                    if(!w.isDragging) return;
                    w.isDragging = false;
                    w.el.style.zIndex = 50;
                    w.el.style.cursor = 'grab';
                    this.checkDrop(w);
                };

                w.el.addEventListener('mousedown', onStart);
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onEnd);
                w.el.addEventListener('touchstart', onStart, {passive: false});
                window.addEventListener('touchmove', (e) => { if(w.isDragging) e.preventDefault(); onMove(e); }, {passive: false});
                window.addEventListener('touchend', onEnd);
            }

            highlightBasket(x, y) {
                document.querySelectorAll('.basket').forEach(b => {
                    const r = b.getBoundingClientRect();
                    if(x > r.left && x < r.right && y > r.top && y < r.bottom) b.classList.add('highlight');
                    else b.classList.remove('highlight');
                });
            }

            checkDrop(w) {
                const rect = w.el.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                let foundBasket = null;
                document.querySelectorAll('.basket').forEach(b => {
                    const r = b.getBoundingClientRect();
                    if(centerX > r.left && centerX < r.right && centerY > r.top && centerY < r.bottom) foundBasket = b;
                    b.classList.remove('highlight');
                });

                if(foundBasket) {
                    if(foundBasket.dataset.type === w.data.type) {
                        // Punkt-Logik: 1=Langsam, 2=Mittel, 3=Schnell
                        let threshold = 1; 
                        if (this.speedMode === 'medium') threshold = 2;
                        if (this.speedMode === 'fast') threshold = 3;

                        this.correctWordCounter++;

                        if (this.correctWordCounter >= threshold) {
                            this.stars += 1;
                            this.correctWordCounter = 0;
                        }

                        this.activeWords = this.activeWords.filter(item => item !== w);
                        w.el.remove();
                        this.updateUI();
                    } else {
                        this.triggerError(w, foundBasket.dataset.type);
                    }
                }
            }

            triggerError(w, chosenType) {
                this.gameRunning = false;
                clearInterval(this.timerInterval);
                const modal = document.getElementById('feedback-modal');
                const content = document.getElementById('error-content');
                
                content.innerHTML = `
                    Das Wort <b>"${w.data.text}"</b> gehört nicht in den Korb für <b>${chosenType}</b>.<br><br>
                    Es ist ein <b>${w.data.type}</b>!<br>
                    <small>Dahinter steckt: ${w.data.base}</small>
                `;
                modal.classList.remove('hidden');
            }

            resume() {
                document.getElementById('feedback-modal').classList.add('hidden');
                this.activeWords.forEach(w => w.el.remove());
                this.activeWords = [];
                this.startGame();
            }

            cancelGame() {
                this.gameRunning = false;
                clearInterval(this.timerInterval);
                this.activeWords.forEach(w => w.el.remove());
                this.activeWords = [];
                document.getElementById('game-area').classList.add('hidden');
                document.getElementById('start-screen').classList.remove('hidden');
            }

            removeWord(idx) {
                if(this.activeWords[idx]) {
                    this.activeWords[idx].el.remove();
                    this.activeWords.splice(idx, 1);
                }
            }

            endGame() {
                this.gameRunning = false;
                clearInterval(this.timerInterval);
                document.getElementById('game-area').classList.add('hidden');
                document.getElementById('win-screen').classList.remove('hidden');
                document.getElementById('final-stars').innerText = `⭐ ${this.stars}`;
                document.getElementById('final-msg').innerText = this.stars > 15 ? "Wow! Du bist ein echter Wort-Profi! 🎈" : "Gut gemacht! Spiel noch eine Runde! 🌟";
            }

            saveAndExit() {
                if (window.parent && window.parent.addStars) window.parent.addStars(this.stars);
                location.reload();
            }

            openAdmin() {
                const pass = prompt("Passwort:");
                if(pass === "1234") {
                    const input = prompt("Wort,Wortart,Grundform:");
                    if(input) {
                        const p = input.split(',');
                        if(p.length === 3) {
                            this.db.push({ text: p[0].trim(), type: p[1].trim(), base: p[2].trim() });
                            localStorage.setItem('regen_db_v2', JSON.stringify(this.db));
                            alert("Gespeichert!");
                        }
                    }
                }
            }
        }

        const game = new WordGame();
    </script>
