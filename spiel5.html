<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Satzglied-Detektiv: Comic-Edition 🔍</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-subjekt: #ff3e3e;   
            --color-praedikat: #2b7fff; 
            --color-objekt: #2ecc71;   
            --comic-border: #1a1a1a;
            --bg-comic: #f0f7ff;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-comic);
            background-image: radial-gradient(rgba(0,0,0,0.05) 2px, transparent 2px);
            background-size: 24px 24px;
            height: 100vh;
            width: 100vw;
            margin: 0;
            overflow: hidden; /* Verhindert Scrollen auf dem Tablet */
            display: flex;
            flex-direction: column;
            user-select: none;
            color: var(--comic-border);
        }

        .game-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0.75rem;
            gap: 0.5rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            height: 100%;
        }

        .comic-card {
            background: white;
            border: 3px solid var(--comic-border);
            box-shadow: 6px 6px 0px var(--comic-border);
            border-radius: 1.5rem;
        }

        .word-token {
            display: inline-block;
            background: white;
            border: 3px solid var(--comic-border);
            padding: 0.5rem 1rem;
            margin: 0.2rem;
            border-radius: 0.8rem;
            font-weight: 700;
            font-size: clamp(1rem, 4vw, 1.4rem);
            box-shadow: 3px 3px 0px var(--comic-border);
            cursor: pointer;
            transition: transform 0.1s;
            touch-action: manipulation;
        }

        .word-token:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px var(--comic-border);
        }

        .bg-subjekt { background-color: var(--color-subjekt) !important; color: white !important; }
        .bg-praedikat { background-color: var(--color-praedikat) !important; color: white !important; }
        .bg-objekt { background-color: var(--color-objekt) !important; color: white !important; }

        .cut-zone {
            width: 34px; /* Breite Touch-Fläche */
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            margin: 0 -10px;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
        }

        .cut-line {
            width: 4px;
            height: 25px;
            background: #cbd5e1;
            border-radius: 2px;
            transition: all 0.2s;
        }

        .cut-zone.active .cut-line {
            background: var(--comic-border);
            height: 40px;
            width: 6px;
        }

        .btn-comic {
            background: #ffde00;
            border: 3px solid var(--comic-border);
            box-shadow: 4px 4px 0px var(--comic-border);
            padding: 0.6rem 1.5rem;
            border-radius: 1rem;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s;
        }

        .btn-comic:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px var(--comic-border);
        }

        .paint-pot {
            flex: 1;
            padding: 0.5rem;
            border: 3px solid var(--comic-border);
            border-radius: 0.8rem;
            font-weight: 800;
            font-size: 0.75rem;
            color: white;
            box-shadow: 3px 3px 0px var(--comic-border);
        }

        .paint-pot.selected {
            transform: scale(1.05) translateY(-3px);
            outline: 3px solid #ffde00;
            box-shadow: 4px 4px 0px var(--comic-border);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .error-shake { animation: shake 0.3s ease-in-out 2; }
    </style>
</head>
<body>

    <div id="start-screen" class="fixed inset-0 bg-[#6c5ce7] z-[100] flex flex-col items-center justify-center p-6 text-center">
        <div class="mb-6 p-8 bg-white border-[6px] border-black rounded-[3rem] shadow-[12px_12px_0px_rgba(0,0,0,0.3)]">
            <h1 class="text-5xl font-black mb-4 text-black uppercase">Satzglied<br><span class="text-[#ff3e3e]">Detektiv</span></h1>
            <p class="text-xl font-bold text-gray-700">Phase 1: Trennen | Phase 2: Färben</p>
        </div>
        <button onclick="game.start()" class="btn-comic text-2xl px-12 py-5 bg-[#ffde00]">
            Starten ⚡
        </button>
    </div>

    <div class="game-wrapper">
        <header class="flex items-center gap-3">
            <button onclick="location.reload()" class="btn-comic p-2 px-4 text-lg">🏠</button>
            <div class="flex-1 h-8 bg-white border-[3px] border-black rounded-full overflow-hidden relative">
                <div id="progress-bar" class="h-full bg-[#ffde00] transition-all duration-500" style="width: 0%"></div>
            </div>
            <div id="score-display" class="bg-white border-[3px] border-black rounded-2xl px-4 py-1 font-black text-xl">⭐ 0</div>
        </header>

        <main class="flex-1 flex flex-col justify-center items-center gap-2 overflow-hidden">
            <div id="phase-label" class="bg-[#1a1a1a] text-white px-4 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest">Phase 1: Trennen</div>
            
            <div id="game-container" class="comic-card w-full p-4 md:p-8 flex flex-wrap justify-center items-center gap-y-2 min-h-[160px]">
                <!-- Inhalte via JS -->
            </div>
        </main>

        <footer class="flex flex-col gap-3">
            <div id="palette" class="hidden flex gap-2">
                <button id="pot-subjekt" onclick="game.selectPot('subjekt')" class="paint-pot bg-subjekt">SUBJEKT</button>
                <button id="pot-praedikat" onclick="game.selectPot('praedikat')" class="paint-pot bg-praedikat">PRÄDIKAT</button>
                <button id="pot-objekt" onclick="game.selectPot('objekt')" class="paint-pot bg-objekt">OBJEKT</button>
            </div>

            <div class="comic-card p-3 flex items-center gap-4 bg-white border-[3px]">
                <span id="feedback-icon" class="text-3xl">💡</span>
                <p id="hint-text" class="font-bold text-sm text-gray-600 leading-tight">Tippe zwischen die Wörter, um die Satzglieder zu trennen!</p>
            </div>

            <div class="flex justify-center">
                <button id="action-btn" onclick="game.check()" class="btn-comic w-full max-w-[280px]">
                    Prüfen! 🔍
                </button>
            </div>
        </footer>
    </div>

    <script>
        const DATA = [
            {
                words: ["Der", "lustige", "Clown", "jongliert", "mit", "Bällen."],
                cuts: [2, 3],
                mapping: [
                    { indices: [0,1,2], type: "subjekt" },
                    { indices: [3], type: "praedikat" },
                    { indices: [4,5], type: "objekt" }
                ]
            },
            {
                words: ["Heute", "essen", "wir", "eine", "Pizza."],
                cuts: [0, 1, 2],
                mapping: [
                    { indices: [0], type: "objekt" }, // Zeitumstand/Objektgruppe
                    { indices: [1], type: "praedikat" },
                    { indices: [2], type: "subjekt" },
                    { indices: [3,4], type: "objekt" }
                ]
            },
            {
                words: ["Das", "kleine", "Kind", "malt", "ein", "Bild."],
                cuts: [2, 3],
                mapping: [
                    { indices: [0,1,2], type: "subjekt" },
                    { indices: [3], type: "praedikat" },
                    { indices: [4,5], type: "objekt" }
                ]
            }
        ];

        class Game {
            constructor() {
                this.score = 0;
                this.currentIndex = 0;
                this.phase = 1;
                this.userCuts = new Set();
                this.userColors = {};
                this.selectedType = null;
                this.firstAttemptSplitting = true;
                this.firstAttemptColoring = true;
            }

            start() {
                document.getElementById('start-screen').classList.add('hidden');
                this.loadLevel();
            }

            loadLevel() {
                const level = DATA[this.currentIndex];
                const container = document.getElementById('game-container');
                container.innerHTML = '';
                this.userCuts.clear();
                this.userColors = {};
                this.phase = 1;
                this.selectedType = null;
                this.firstAttemptSplitting = true;
                this.firstAttemptColoring = true;

                this.updateProgress();
                document.getElementById('phase-label').innerText = "Phase 1: Trennen";
                document.getElementById('palette').classList.add('hidden');
                this.setFeedback("💡", "Tippe zwischen die Wörter, um die Satzglieder zu trennen!");
                this.setButton("Prüfen! 🔍", "#ffde00", () => this.check());

                level.words.forEach((word, i) => {
                    const wSpan = document.createElement('div');
                    wSpan.className = "word-token";
                    wSpan.innerText = word;
                    wSpan.id = `word-${i}`;
                    wSpan.onclick = () => this.handleWordClick(i);
                    container.appendChild(wSpan);

                    if (i < level.words.length - 1) {
                        const zone = document.createElement('div');
                        zone.className = "cut-zone";
                        zone.id = `zone-${i}`;
                        zone.innerHTML = '<div class="cut-line"></div>';
                        zone.onclick = () => this.toggleCut(i);
                        container.appendChild(zone);
                    }
                });
            }

            toggleCut(index) {
                if (this.phase !== 1) return;
                const zone = document.getElementById(`zone-${index}`);
                if (this.userCuts.has(index)) {
                    this.userCuts.delete(index);
                    zone.classList.remove('active');
                } else {
                    this.userCuts.add(index);
                    zone.classList.add('active');
                }
            }

            check() {
                if (this.phase === 1) this.checkSplitting();
                else this.checkColoring();
            }

            checkSplitting() {
                const level = DATA[this.currentIndex];
                let errors = 0;
                
                // Prüfen auf Fehler
                for (let i = 0; i < level.words.length - 1; i++) {
                    if (level.cuts.includes(i) !== this.userCuts.has(i)) errors++;
                }

                // PUNKTE NUR BEIM 1. VERSUCH
                if (this.firstAttemptSplitting) {
                    level.cuts.forEach(cutIndex => {
                        if (this.userCuts.has(cutIndex)) this.score++;
                    });
                    this.firstAttemptSplitting = false;
                    this.updateUI();
                }

                if (errors === 0) {
                    this.setFeedback("💥", "BOOM! Richtig getrennt. Jetzt bestimmen wir die Farben!");
                    this.setButton("Weiter ➔", "#2ecc71", () => this.startPhase2());
                } else {
                    this.shake();
                    this.setFeedback("🧐", "Da stimmt was nicht! Korrigiere die Schnitte. (Keine neuen Punkte)");
                }
            }

            startPhase2() {
                this.phase = 2;
                document.getElementById('phase-label').innerText = "Phase 2: Bestimmen";
                document.getElementById('palette').classList.remove('hidden');
                this.setButton("Prüfen! 🔍", "#ffde00", () => this.check());
                
                const level = DATA[this.currentIndex];
                // Nur die richtigen Schnitte anzeigen
                for (let i = 0; i < level.words.length - 1; i++) {
                    const zone = document.getElementById(`zone-${i}`);
                    zone.onclick = null;
                    if (!level.cuts.includes(i)) zone.style.display = 'none';
                    else zone.classList.add('active');
                }
            }

            handleWordClick(index) {
                if (this.phase !== 2 || !this.selectedType) return;
                const wordEl = document.getElementById(`word-${index}`);
                
                if (this.userColors[index] === this.selectedType) {
                    delete this.userColors[index];
                    wordEl.className = "word-token";
                } else {
                    this.userColors[index] = this.selectedType;
                    wordEl.className = `word-token bg-${this.selectedType}`;
                }
            }

            selectPot(type) {
                this.selectedType = type;
                document.querySelectorAll('.paint-pot').forEach(p => p.classList.remove('selected'));
                document.getElementById(`pot-${type}`).classList.add('selected');
                this.setFeedback("🎨", `Färbe jetzt alle Teile für: **${type.toUpperCase()}**`);
            }

            checkColoring() {
                const level = DATA[this.currentIndex];
                let allCorrect = true;
                let groupsCorrect = 0;
                
                level.mapping.forEach(group => {
                    const isGroupCorrect = group.indices.every(idx => this.userColors[idx] === group.type);
                    // Sicherstellen, dass nicht mehr als die Gruppe gefärbt wurde
                    if (isGroupCorrect) groupsCorrect++;
                    else allCorrect = false;
                });

                // PUNKTE NUR BEIM 1. VERSUCH
                if (this.firstAttemptColoring) {
                    this.score += groupsCorrect;
                    this.firstAttemptColoring = false;
                    this.updateUI();
                }

                if (allCorrect && Object.keys(this.userColors).length === level.words.length) {
                    this.setFeedback("🏆", "SUPER! Alles richtig erkannt.");
                    this.setButton("Nächster Satz ➔", "#2ecc71", () => this.nextLevel());
                } else {
                    this.shake();
                    this.setFeedback("🤔", "Einige Farben stimmen noch nicht. (Punkte bereits gezählt)");
                }
            }

            nextLevel() {
                this.currentIndex++;
                if (this.currentIndex >= DATA.length) this.finish();
                else this.loadLevel();
            }

            updateUI() {
                document.getElementById('score-display').innerText = `⭐ ${this.score}`;
            }

            updateProgress() {
                const percent = (this.currentIndex / DATA.length) * 100;
                document.getElementById('progress-bar').style.width = `${percent}%`;
                this.updateUI();
            }

            setFeedback(icon, text) {
                document.getElementById('feedback-icon').innerText = icon;
                document.getElementById('hint-text').innerHTML = text;
            }

            setButton(text, color, action) {
                const btn = document.getElementById('action-btn');
                btn.innerText = text;
                btn.style.backgroundColor = color;
                btn.onclick = action;
            }

            shake() {
                const container = document.getElementById('game-container');
                container.classList.add('error-shake');
                setTimeout(() => container.classList.remove('error-shake'), 400);
            }

            finish() {
                // Punkte übertragen an localStorage
                const prevStars = parseInt(localStorage.getItem('totalStars') || '0');
                localStorage.setItem('totalStars', prevStars + this.score);

                document.getElementById('game-container').innerHTML = `
                    <div class="text-center w-full py-4">
                        <div class="text-6xl mb-2">🏆</div>
                        <h2 class="text-3xl font-black mb-1 uppercase">Satz-Held!</h2>
                        <p class="text-lg font-bold text-gray-600 mb-4">Du hast ${this.score} Sterne gesammelt.</p>
                        <button onclick="window.location.href='index.html'" class="btn-comic bg-[#6c5ce7] text-white">Zurück zum HQ 🚀</button>
                    </div>
                `;
                document.getElementById('palette').remove();
                document.getElementById('action-btn').remove();
                this.setFeedback("✨", "Deine Sterne wurden sicher übertragen!");
            }
        }

        const game = new Game();
    </script>
</body>
</html>
